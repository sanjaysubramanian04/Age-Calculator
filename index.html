<!DOCTYPE html>

<head>

    <button onclick="calculateAge()">Calculate Age</button>

    <div id="result"></div>

      <!-- bubbles will animate in background -->

      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
